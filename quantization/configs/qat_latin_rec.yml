# Quantization-Aware Training config for PP-OCRv5 mobile latin recognition
#
# Based on PP-OCRv5_mobile_rec.yml from PaddleOCR.
# Architecture: SVTR_LCNet with PPLCNetV3 backbone (mobile variant).
#
# Key differences from full training config:
# - Only 10 epochs (QAT fine-tuning, not training from scratch)
# - Lower learning rate (0.0001 vs 0.0005)
# - Smaller batch size (64 vs 128) to fit GPU memory with QAT overhead
# - SimpleDataSet instead of MultiScaleDataSet (simpler for QAT)
# - Uses local data/ directory with downloaded MJSynth subset
#
# Usage:
#   python PaddleOCR/deploy/slim/quantization/quant.py \
#     -c configs/qat_latin_rec.yml \
#     -o Global.pretrained_model=<path_to_pretrained> \
#        Global.character_dict_path=<path_to_keys.txt>

Global:
  model_name: latin_PP-OCRv5_mobile_rec_qat
  debug: false
  use_gpu: true
  epoch_num: 10
  log_smooth_window: 20
  print_batch_step: 10
  save_model_dir: ./output/qat_latin_rec/
  save_epoch_step: 1
  eval_batch_step: [0, 500]
  cal_metric_during_train: true
  calc_epoch_interval: 1
  pretrained_model: null
  checkpoints: null
  save_inference_dir: null
  use_visualdl: false
  infer_img: null
  # Path to the PP-OCRv5 latin character dictionary
  # Override at runtime: -o Global.character_dict_path=../models/v5_latin_rec/keys.txt
  character_dict_path: null
  max_text_length: &max_text_length 25
  infer_mode: false
  use_space_char: true
  distributed: false
  save_res_path: ./output/rec/predicts_qat.txt
  d2s_train_image_shape: [3, 48, 320]

Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  lr:
    name: Cosine
    learning_rate: 0.0001
    warmup_epoch: 1
  regularizer:
    name: L2
    factor: 3.0e-05

# PP-OCRv5 mobile rec architecture
# Algorithm: SVTR_LCNet  |  Backbone: PPLCNetV3 (scale 0.95)
# Dual-head: CTC + NRTR
Architecture:
  model_type: rec
  algorithm: SVTR_LCNet
  Transform:
  Backbone:
    name: PPLCNetV3
    scale: 0.95
  Head:
    name: MultiHead
    head_list:
      - CTCHead:
          Neck:
            name: svtr
            dims: 120
            depth: 2
            hidden_dims: 120
            kernel_size: [1, 3]
            use_guide: true
          Head:
            fc_decay: 0.00001
      - NRTRHead:
          nrtr_dim: 384
          max_text_length: *max_text_length

Loss:
  name: MultiLoss
  loss_config_list:
    - CTCLoss:
    - NRTRLoss:

PostProcess:
  name: CTCLabelDecode

Metric:
  name: RecMetric
  main_indicator: acc
  ignore_space: false

Train:
  dataset:
    name: SimpleDataSet
    data_dir: /app/quantization/data/train/
    label_file_list:
      - /app/quantization/data/train_list.txt
    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: false
      - RecAug:
      - MultiLabelEncode:
          gtc_encode: NRTRLabelEncode
      - RecResizeImg:
          image_shape: [3, 48, 320]
      - KeepKeys:
          keep_keys:
            - image
            - label_ctc
            - label_gtc
            - length
            - valid_ratio
  loader:
    shuffle: true
    batch_size_per_card: 64
    drop_last: true
    num_workers: 4

Eval:
  dataset:
    name: SimpleDataSet
    data_dir: /app/quantization/data/val/
    label_file_list:
      - /app/quantization/data/val_list.txt
    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: false
      - MultiLabelEncode:
          gtc_encode: NRTRLabelEncode
      - RecResizeImg:
          image_shape: [3, 48, 320]
      - KeepKeys:
          keep_keys:
            - image
            - label_ctc
            - label_gtc
            - length
            - valid_ratio
  loader:
    shuffle: false
    drop_last: false
    batch_size_per_card: 128
    num_workers: 4
