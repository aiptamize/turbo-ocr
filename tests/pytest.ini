[pytest]
markers =
    stress: long-running soak test (60s+); excluded from default run
    benchmark: performance measurement; excluded from default run
    accuracy: ground-truth scoring on local fixtures
    layout: requires ENABLE_LAYOUT=1; auto-skipped otherwise
addopts = -ra --strict-markers
testpaths = unit integration regression accuracy
python_files = test_*.py
python_classes = Test*
python_functions = test_*
